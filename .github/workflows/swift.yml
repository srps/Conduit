# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: macos-26

    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer" xcrun swift build -v
    - name: Run tests
      run: DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer" xcrun swift test -v
    - name: Perf gate
      run: bash ./scripts/perf-gate.sh
