# H2 — Sanitizer soak (see docs/design-extension-model-and-vision-grounding.md §4).
#
# Scheduled, not per-PR: ASan/TSan builds are slow and the bugs they catch
# live at C-API boundaries (GSS, CommonCrypto, CFNetwork) where the type
# system can't help — the spnego_reply SIGSEGV class. The pm-sim chaos suite
# exercises the real NIO runtime end-to-end, which is exactly the surface
# the sanitizers need to see.

name: Sanitizer soak

on:
  schedule:
    # Weekly, Monday 03:00 UTC.
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  asan:
    name: pm-sim under AddressSanitizer
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Build (ASan)
        run: DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer" xcrun swift build --sanitize=address
      - name: pm-sim suite (ASan)
        run: DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer" xcrun swift run --sanitize=address pm-sim all
      - name: websocket-upgrade scenario (ASan)
        run: DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer" xcrun swift run --sanitize=address pm-sim websocket-upgrade

  tsan:
    name: pm-sim under ThreadSanitizer
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Build (TSan)
        run: DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer" xcrun swift build --sanitize=thread
      - name: pm-sim suite (TSan)
        run: DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer" xcrun swift run --sanitize=thread pm-sim all
      - name: websocket-upgrade scenario (TSan)
        run: DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer" xcrun swift run --sanitize=thread pm-sim websocket-upgrade

  # Unit/integration tests under TSan catch handler-confinement races the
  # simulator's schedules may not interleave.
  tsan-tests:
    name: swift test under ThreadSanitizer
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - name: Test (TSan)
        run: DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer" xcrun swift test --sanitize=thread
